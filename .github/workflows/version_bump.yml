name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Detect changed packages and bump versions
        id: bump
        run: |
          bump_version() {
            local version=$1 kind=$2
            IFS='.' read -r major minor patch <<< "$version"
            case $kind in
              major) echo "$((major+1)).0.0" ;;
              minor) echo "${major}.$((minor+1)).0" ;;
              patch) echo "${major}.${minor}.$((patch+1))" ;;
            esac
          }

          detect_release_kind() {
            local commits="$1"
            if echo "$commits" | grep -qE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE'; then
              echo "major"
            elif echo "$commits" | grep -qE '^feat(\(.+\))?:'; then
              echo "minor"
            else
              echo "patch"
            fi
          }

          PACKAGES=("core" "cli")
          BUMPED_TAGS=()

          for pkg in "${PACKAGES[@]}"; do
            LATEST_TAG=$(git tag -l "${pkg}@*" | sort -V | tail -n1)
            CURRENT_VERSION=$(grep -o '"version": *"[^"]*"' "${pkg}/deno.jsonc" | head -1 | grep -o '[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*')

            if [ -z "$CURRENT_VERSION" ]; then
              echo "Failed to extract version from ${pkg}/deno.jsonc" >&2
              exit 1
            fi

            if [ -z "$LATEST_TAG" ]; then
              # 初回リリース: 履歴からの種別判定は行なわず、コミット済みバージョンをそのまま公開する
              NEW_VERSION=$CURRENT_VERSION
              echo "First release for ${pkg}: ${NEW_VERSION}"
            else
              DIFF_OUTPUT=$(git diff --name-only "${LATEST_TAG}..HEAD" -- "${pkg}/")

              if [ -z "$DIFF_OUTPUT" ]; then
                echo "No changes in ${pkg}, skipping."
                continue
              fi

              echo "Changes detected in ${pkg}."

              # 本文の BREAKING CHANGE フッターも判定対象にするため件名(%s)と本文(%b)を含める
              COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD" -- "${pkg}/")
              KIND=$(detect_release_kind "$COMMITS")
              echo "Release kind for ${pkg}: ${KIND}"

              NEW_VERSION=$(bump_version "$CURRENT_VERSION" "$KIND")
              echo "Bumping ${pkg}: ${CURRENT_VERSION} -> ${NEW_VERSION}"

              sed -i "s/\"version\": *\"${CURRENT_VERSION}\"/\"version\": \"${NEW_VERSION}\"/" "${pkg}/deno.jsonc"
            fi

            BUMPED_TAGS+=("${pkg}@${NEW_VERSION}")
            echo "${pkg}_bumped=true" >> "$GITHUB_OUTPUT"
            echo "${pkg}_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          done

          if [ ${#BUMPED_TAGS[@]} -eq 0 ]; then
            echo "No packages to bump."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          TAGS_JSON=$(printf '%s\n' "${BUMPED_TAGS[@]}" | jq -R . | jq -s -c .)
          echo "tags=${TAGS_JSON}" >> "$GITHUB_OUTPUT"

      # cli は core の workspace 依存を公開済みバージョンへ書き換えて publish されるため、
      # 必ず core を先に publish する。commit とタグ push は publish 成功後に行い、
      # 失敗時に未公開バージョンのバンプがリポジトリに残らないようにする。
      - name: Publish core
        if: steps.bump.outputs.core_bumped == 'true'
        run: deno publish --allow-dirty --config core/deno.jsonc

      - name: Publish cli
        if: steps.bump.outputs.cli_bumped == 'true'
        run: deno publish --allow-dirty --config cli/deno.jsonc

      - name: Commit and push
        if: steps.bump.outputs.has_changes == 'true'
        run: |
          if git diff --quiet; then
            echo "No version changes to commit (first release)."
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bump package versions"
          git push

      - name: Create tags and GitHub Releases
        if: steps.bump.outputs.has_changes == 'true'
        env:
          TAGS: ${{ steps.bump.outputs.tags }}
          GH_TOKEN: ${{ github.token }}
        run: |
          for tag in $(echo "$TAGS" | jq -r '.[]'); do
            pkg="${tag%%@*}"
            # リリースノートの起点にする同一パッケージの直前タグ(新タグ作成前に取得)
            PREV_TAG=$(git tag -l "${pkg}@*" | sort -V | tail -n1)

            git tag "$tag"
            git push origin "$tag"

            # releases/latest/download/... の直リンクが常にシングルバイナリつきの
            # cliリリースを指すよう、cli以外はlatestの対象から外す
            if [ "$pkg" = "cli" ]; then
              LATEST_FLAG="--latest"
            else
              LATEST_FLAG="--latest=false"
            fi

            if [ -n "$PREV_TAG" ]; then
              gh release create "$tag" --title "$tag" "$LATEST_FLAG" --generate-notes --notes-start-tag "$PREV_TAG"
            else
              gh release create "$tag" --title "$tag" "$LATEST_FLAG" --generate-notes
            fi

            # cli はプラットフォームごとのシングルバイナリをコンパイルしてリリースに添付する
            if [ "$pkg" = "cli" ]; then
              bash .github/scripts/upload_cli_binaries.sh "$tag"
            fi
          done

      # core のみバンプされた場合、最新の cli リリースに添付済みのバイナリは古い core を
      # 埋め込んだままになる。HEAD から再コンパイルしてアセットを差し替えることで、
      # releases/latest/download/... の URL が常に最新 core を含むバイナリを配信するようにする
      - name: Rebuild cli binaries with updated core
        if: steps.bump.outputs.core_bumped == 'true' && steps.bump.outputs.cli_bumped != 'true'
        env:
          CORE_VERSION: ${{ steps.bump.outputs.core_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_CLI_TAG=$(git tag -l "cli@*" | sort -V | tail -n1)
          if [ -z "$LATEST_CLI_TAG" ]; then
            echo "No cli release exists yet, nothing to replace."
            exit 0
          fi

          bash .github/scripts/upload_cli_binaries.sh "$LATEST_CLI_TAG"

          # 差し替え後のバイナリはタグ時点のソースと一致しなくなるため、
          # トレーサビリティのためにリリースノートへ差し替えた旨を追記する
          CURRENT_NOTES=$(gh release view "$LATEST_CLI_TAG" --json body --jq .body)
          gh release edit "$LATEST_CLI_TAG" --notes "${CURRENT_NOTES}

          Binaries rebuilt with core@${CORE_VERSION}."
