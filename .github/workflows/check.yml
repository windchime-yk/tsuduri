name: Checked Code
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Lint
        run: deno lint
      - name: Format Check
        run: deno fmt --check
      # lpのnpm依存(vite/honox)をnode_modulesへ展開する
      - name: Install dependencies
        run: deno install
      - name: Doc Lint (core)
        run: deno doc --lint core/mod.ts
      - name: Doc Lint (cli)
        run: deno doc --lint cli/mod.ts
      - name: Test
        run: deno task test
      - name: Publish dry-run (core)
        run: deno publish --dry-run --config core/deno.jsonc
      - name: Publish dry-run (cli)
        run: deno publish --dry-run --config cli/deno.jsonc
      - name: Upload core coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: core/coverage/lcov.info
          flags: core
      - name: Upload cli coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cli/coverage/lcov.info
          flags: cli
