name: Checked Code
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Lint
        run: deno lint
      - name: Format Check
        run: deno fmt --check
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # publish: JSRに公開するパッケージのみtrue（doc lintとpublish dry-runの対象）
          - package: core
            publish: true
          - package: cli
            publish: true
          - package: gas
            publish: false
          - package: lp
            publish: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # lpのnpm依存(vite/honox)をnode_modulesへ展開する
      - name: Install dependencies
        run: deno install
      - name: Doc Lint
        if: ${{ matrix.publish }}
        run: deno doc --lint ${{ matrix.package }}/mod.ts
      - name: Test
        run: deno task --cwd ${{ matrix.package }} test
      - name: Publish dry-run
        if: ${{ matrix.publish }}
        run: deno publish --dry-run --config ${{ matrix.package }}/deno.jsonc
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.package }}
