name: Publish package

on:
  push:
    tags:
      - "core@*"
      - "cli@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Extract package name from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          PACKAGE="${TAG%%@*}"
          echo "name=${PACKAGE}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: deno publish --config ${{ steps.pkg.outputs.name }}/deno.jsonc
